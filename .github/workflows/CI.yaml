name: Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # 自動快取 node_modules

      - name: Install dependencies
        run: npm install

      - name: Code Linting
        # 這裡會跑 oxlint 與 eslint
        run: npm run lint

      # - name: Code Formatting Check
      #   # 檢查程式碼是否符合 prettier 規範
      #   run: npm run format

      # - name: Unit Tests
      #   # 執行 vitest
      #   run: npm run test:unit

      # - name: Type Check & Build
      #   # 執行 type-check 與 build-only (使用 run-p)
      #   run: npm run build

