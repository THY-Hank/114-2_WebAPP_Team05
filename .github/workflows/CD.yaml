name: Docker Build and K8s Deploy

on:
  workflow_call:
  # push:
  #   branches: ["main", "master"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      repo_name_lc: ${{ steps.owner.outputs.repo_name_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: owner
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "repo_name_lc=${REPO_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ steps.owner.outputs.repo_name_lc }}-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ steps.owner.outputs.repo_name_lc }}-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ steps.owner.outputs.repo_name_lc }}-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ steps.owner.outputs.repo_name_lc }}-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Create or update app secret
        run: |
          kubectl create namespace team05 --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secrets \
            -n team05 \
            --from-literal=SECRET_KEY='${{ secrets.SECRET_KEY }}' \
            --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=AES_KEY='${{ secrets.AES_KEY }}' \
            --from-literal=AES_IV='${{ secrets.AES_IV }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/prod

      - name: Set release images
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.owner_lc }}/${{ needs.build-and-push.outputs.repo_name_lc }}-backend:${{ needs.build-and-push.outputs.image_tag }} \
            -n team05
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.owner_lc }}/${{ needs.build-and-push.outputs.repo_name_lc }}-frontend:${{ needs.build-and-push.outputs.image_tag }} \
            -n team05

      - name: Rollout status
        run: |
          kubectl rollout status deployment/backend -n team05 --timeout=180s
          kubectl rollout status deployment/frontend -n team05 --timeout=180s
