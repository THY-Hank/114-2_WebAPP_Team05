name: Docker Build and K8s Deploy

on:
#要使用把這裡打開
  # push:
  #   branches: ["main"]

permissions:
  contents: read
  id-token: write # Required for OIDC, though we use keys for now

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/team05hwbackend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/team05hwbackend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_AES_KEY=${{ secrets.AES_KEY }}
            VITE_AES_IV=${{ secrets.AES_IV }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/team05hwfrontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/team05hwfrontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (to get registry URL)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create or update app secret
        run: |
          kubectl create namespace team05 --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secrets \
            -n team05 \
            --from-literal=SECRET_KEY='${{ secrets.SECRET_KEY }}' \
            --from-literal=DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            --from-literal=DB_HOST='${{ secrets.DB_HOST }}' \
            --from-literal=DB_NAME='${{ secrets.DB_NAME }}' \
            --from-literal=DB_USER='${{ secrets.DB_USER }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=AES_KEY='${{ secrets.AES_KEY }}' \
            --from-literal=AES_IV='${{ secrets.AES_IV }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/prod

      - name: Set release images
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          
          kubectl set image deployment/backend \
            backend=$REGISTRY/team05hwbackend:$TAG \
            -n team05
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/team05hwfrontend:$TAG \
            -n team05

      - name: Rollout status
        run: |
          echo "Waiting for deployments to stabilize..."
          kubectl rollout status deployment/backend -n team05 --timeout=180s
          kubectl rollout status deployment/frontend -n team05 --timeout=180s

      - name: Run database migrations
        run: |
          # Now that rollout is successful, we can pick any ready pod
          BACKEND_POD=$(kubectl get pods -n team05 -l app=backend -o jsonpath="{.items[0].metadata.name}")
          echo "Rollout ready. Running migrations on $BACKEND_POD..."
          kubectl exec -n team05 $BACKEND_POD -- python manage.py migrate --noinput
