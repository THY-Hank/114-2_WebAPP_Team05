apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: patch-configmap.yaml
  - path: patch-backend.yaml
  - path: patch-frontend.yaml
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: postgres
      $patch: delete
  - target:
      kind: Service
      name: postgres
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
      $patch: delete
