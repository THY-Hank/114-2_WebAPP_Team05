<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>
  <div class="register-container">
    <div class="register-box">
      <h1>建立帳號</h1>
      <p class="subtitle">註冊你的帳號以開始使用聊天室</p>

      <form>
        <label for="username">使用者名稱</label>
        <input type="text" id="username" name="username" placeholder="請輸入使用者名稱" />

        <label for="email">電子郵件</label>
        <input type="email" id="email" name="email" placeholder="請輸入電子郵件" />

        <label for="password">密碼</label>
        <input type="password" id="password" name="password" placeholder="請輸入密碼" />

        <label for="confirm-password">確認密碼</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="請再次輸入密碼" />

        <button type="submit">註冊</button>
      </form>

      <p class="login-link">
        已經有帳號了嗎？<a href="index.html">前往登入</a>
      </p>
    </div>
  </div>
</body>
</html>
